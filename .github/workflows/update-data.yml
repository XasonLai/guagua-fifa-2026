name: update-data

on:
  # World Cup ended; resume this schedule for the 2030 tournament.
  # schedule:
  #   - cron: "7,37 14-23,0-7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/update_data.py --check
      - run: python scripts/update_data.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Update World Cup data"
          git push
